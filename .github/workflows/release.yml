name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without v prefix"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./... -count=1

      - name: Build release artifacts
        env:
          PI_PRO_VERSION: ${{ inputs.version || github.ref_name }}
          PI_PRO_SERVER_URL: https://api.pi-pro.org
        run: |
          VERSION="${PI_PRO_VERSION#v}"
          PI_PRO_VERSION="$VERSION" sh scripts/build-release.sh
          mkdir -p dist/release-assets
          cp dist/releases/manifest.json dist/release-assets/manifest.json
          tar -czf "dist/release-assets/pi-pro-cli-${VERSION}-release.tar.gz" -C "dist/releases" "$VERSION"
          for platform_dir in dist/releases/"$VERSION"/*-*; do
            platform="$(basename "$platform_dir")"
            if [ -f "$platform_dir/pi-pro.exe" ]; then
              cp "$platform_dir/pi-pro.exe" "dist/release-assets/pi-pro-${VERSION}-${platform}.exe"
            else
              cp "$platform_dir/pi-pro" "dist/release-assets/pi-pro-${VERSION}-${platform}"
            fi
            if [ -f "$platform_dir/pi-pro-updater.exe" ]; then
              cp "$platform_dir/pi-pro-updater.exe" "dist/release-assets/pi-pro-updater-${VERSION}-${platform}.exe"
            fi
          done
          (cd dist/release-assets && sha256sum * > SHA256SUMS)
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: pi-pro-cli-${{ env.VERSION }}-release
          path: dist/release-assets/*

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${VERSION}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/release-assets/* --clobber
          else
            gh release create "$TAG" dist/release-assets/* --title "PI-Pro CLI ${VERSION}" --notes "PI-Pro CLI ${VERSION}"
          fi
